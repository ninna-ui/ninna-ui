name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  validate:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run

      - name: Check internal deps not exposed
        run: pnpm check-internal-deps

      - name: Validate exports (publint)
        run: pnpm check-exports

      - name: Validate pack (dry-run)
        run: pnpm check-pack

      - name: Validate Changeset (if needed)
        run: |
          echo "🔍 Checking for public package changes..."
          
          # Check if any public packages were modified
          PUBLIC_PACKAGES="@ninna-ui/core|@ninna-ui/primitives|@ninna-ui/cli|@ninna-ui/code-block|@ninna-ui/data-display|@ninna-ui/feedback|@ninna-ui/forms|@ninna-ui/layout|@ninna-ui/navigation|@ninna-ui/overlays"
          CHANGED_PUBLIC=$(git diff --name-only origin/main...HEAD | grep -E "^packages/($PUBLIC_PACKAGES)/" || true)
          
          # Check if only private packages/docs were changed
          PRIVATE_ONLY=$(git diff --name-only origin/main...HEAD | grep -E "^packages/(utils|react-internal|eslint-config|test-config|tsconfig)/" || true)
          DOCS_ONLY=$(git diff --name-only origin/main...HEAD | grep -E "^docs/|README\.md|\.md$" || true)
          
          if [ -n "$CHANGED_PUBLIC" ]; then
            echo "📦 Public packages were modified:"
            echo "$CHANGED_PUBLIC"
            echo ""
            
            # Check if changeset exists
            CHANGESET_FILES=$(git diff --name-only origin/main...HEAD | grep '.changeset/' || true)
            if [ -z "$CHANGESET_FILES" ]; then
              echo "❌ CHANGES REQUIRED: Public package changes detected but no changeset found!"
              echo ""
              echo "To fix this:"
              echo "1. Run: pnpm changeset"
              echo "2. Select the affected public packages (exclude private packages)"
              echo "3. Choose version type: patch | minor | major"
              echo "4. Add a summary of your changes"
              echo "5. Commit the changeset file: git add .changeset/*.md"
              echo ""
              echo "Public packages requiring changeset:"
              echo "- @ninna-ui/core, @ninna-ui/primitives, @ninna-ui/cli, @ninna-ui/code-block"
              echo "- @ninna-ui/data-display, @ninna-ui/feedback, @ninna-ui/forms, @ninna-ui/layout"
              echo "- @ninna-ui/navigation, @ninna-ui/overlays"
              echo ""
              echo "Private packages (no changeset needed):"
              echo "- @ninna-ui/utils, @ninna-ui/react-internal, @ninna-ui/eslint-config"
              echo "- @ninna-ui/test-config, @ninna-ui/tsconfig"
              exit 1
            else
              echo "✅ Changeset found: $CHANGESET_FILES"
            fi
          else
            if [ -n "$PRIVATE_ONLY" ] && [ -z "$DOCS_ONLY" ]; then
              echo "🔧 Only private packages modified - no changeset required"
            elif [ -n "$DOCS_ONLY" ] && [ -z "$CHANGED_PUBLIC" ]; then
              echo "📚 Only documentation changes - no changeset required"
            else
              echo "✅ No public package changes detected"
            fi
          fi
