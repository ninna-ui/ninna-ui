name: CI

on:
  pull_request:
    branches: [main]

# Least-privilege permissions — fixes CodeQL "Workflow does not contain permissions"
# Each permission is explicitly scoped to the minimum required.
permissions:
  contents: read       # checkout repo
  pull-requests: read  # read PR metadata (changeset validation)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changeset diff

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify CSS safelist is up-to-date
        run: |
          node packages/core/scripts/generate-safelist.mjs
          if git diff --quiet packages/core/src/theme/tailwind.css; then
            echo "✅ CSS safelist is up-to-date"
          else
            echo "❌ CSS safelist is out-of-date!"
            echo "   Run: node packages/core/scripts/generate-safelist.mjs"
            echo "   Then commit the updated packages/core/src/theme/tailwind.css"
            git diff packages/core/src/theme/tailwind.css
            exit 1
          fi

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run

      - name: Check internal deps not exposed
        run: pnpm check-internal-deps

      - name: Validate exports
        run: pnpm check-exports

      - name: Validate package (dry run)
        run: pnpm check-pack

      - name: Validate Changeset
        run: |
          chmod +x .github/scripts/validate-changeset.sh
          .github/scripts/validate-changeset.sh
