name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release PR or Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      pull-requests: write
      # id-token: write  # Temporarily disabled to force token usage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@ninna-ui'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build before release
        run: pnpm build

      - name: Verify CSS safelist is up-to-date
        run: |
          cd packages/core
          node scripts/generate-safelist.mjs
          if git diff --quiet src/theme/tailwind.css; then
            echo "✅ Safelist is up-to-date"
          else
            echo "❌ Safelist is out-of-date — run 'node scripts/generate-safelist.mjs' and commit"
            git diff src/theme/tailwind.css
            exit 1
          fi

      - name: Run tests before release
        run: pnpm test

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          title: "chore: version packages"
          commit: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          NPM_CONFIG_ALWAYS_AUTH: true 

      - name: Notify on Success
        if: ${{ steps.changesets.outputs.published == 'true' }}
        run: |
          echo "🎉 Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | "- \(.name)@\(.version)"' 
